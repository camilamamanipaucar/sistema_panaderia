<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Nuevo Pedido Especial</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>Nuevo Pedido Especial</h1>

    <form th:action="@{/pedidos-especiales/guardar}" th:object="${pedidoEspecial}" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <input type="text" th:field="*{cliente}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" th:field="*{telefono}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Sabor</label>
            <input type="text" th:field="*{sabor}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tamaño</label>
            <input type="text" th:field="*{tamano}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de entrega</label>
            <input type="date" th:field="*{fechaEntrega}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <input type="text" th:field="*{estado}" class="form-control" value="Pendiente" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tienda</label>
            <select name="tiendaId" class="form-control" required>
                <option value="">Seleccione una tienda</option>
                <option th:each="tienda : ${tiendas}"
                        th:value="${tienda.id}"
                        th:text="${tienda.nombre}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Imagen de referencia</label>
            <input type="file" name="archivoImagen" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/pedidos-especiales}" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
