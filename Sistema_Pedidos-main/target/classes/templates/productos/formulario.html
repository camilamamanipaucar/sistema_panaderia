<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Formulario de Producto</title>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
  <h1 th:text="${producto.id == null} ? 'Nuevo Producto' : 'Editar Producto'"></h1>

  <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" th:field="*{nombre}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Categoría</label>
      <input type="text" th:field="*{categoria}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Stock</label>
      <input type="number" th:field="*{stock}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a th:href="@{/productos}" class="btn btn-secondary">Volver</a>
  </form>
</div>
</body>
</html>
