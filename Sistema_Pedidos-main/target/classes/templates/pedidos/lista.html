<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Lista de Pedidos</title>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
  <h1>Lista de Pedidos</h1>

  <a th:href="@{/pedidos/nuevo}" class="btn btn-primary mb-3">Nuevo Pedido</a>

  <table class="table table-bordered table-striped">
    <thead>
    <tr>
      <th>ID</th>
      <th>Fecha</th>
      <th>Estado</th>
      <th>Tienda</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="pedido : ${pedidos}">
      <td th:text="${pedido.id}"></td>
      <td th:text="${pedido.fecha}"></td>
      <td th:text="${pedido.estado}"></td>
      <td th:text="${pedido.tienda != null ? pedido.tienda.nombre : 'Sin tienda'}"></td>
      <td>
        <a th:href="@{/detalle-pedido/{pedidoId}(pedidoId=${pedido.id})}" class="btn btn-info btn-sm">Ver Detalle</a>
        <a th:href="@{/pedidos/editar/{id}(id=${pedido.id})}" class="btn btn-warning btn-sm">Editar</a>
        <a th:href="@{/pedidos/eliminar/{id}(id=${pedido.id})}" class="btn btn-danger btn-sm"
           onclick="return confirm('¿Seguro que deseas eliminar este pedido?')">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
