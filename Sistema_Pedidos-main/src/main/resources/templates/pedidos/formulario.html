<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Formulario de Pedido</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1 th:text="${pedido.id == null} ? 'Nuevo Pedido' : 'Editar Pedido'"></h1>

    <form th:action="@{/pedidos/guardar}" th:object="${pedido}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" th:field="*{fecha}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <input type="text" th:field="*{estado}" class="form-control" placeholder="Pendiente" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tienda</label>
            <select name="tienda" class="form-control" required>
                <option value="">Seleccione una tienda</option>
                <option th:each="tienda : ${tiendas}"
                        th:value="${tienda.id}"
                        th:text="${tienda.nombre}"
                        th:selected="${pedido.tienda != null and pedido.tienda.id == tienda.id}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/pedidos}" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
