<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Detalle del Pedido</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>Detalle del Pedido</h1>

    <p><strong>ID Pedido:</strong> <span th:text="${pedido.id}"></span></p>
    <p><strong>Fecha:</strong> <span th:text="${pedido.fecha}"></span></p>
    <p><strong>Tienda:</strong> <span th:text="${pedido.tienda.nombre}"></span></p>

    <a th:href="@{/detalle-pedido/nuevo/{pedidoId}(pedidoId=${pedido.id})}" class="btn btn-primary mb-3">
        Agregar Producto
    </a>

    <a th:href="@{/pedidos}" class="btn btn-secondary mb-3">Volver a Pedidos</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="detalle : ${detalles}">
            <td th:text="${detalle.id}"></td>
            <td th:text="${detalle.producto.nombre}"></td>
            <td th:text="${detalle.cantidad}"></td>
            <td>
                <a th:href="@{/detalle-pedido/eliminar/{id}/{pedidoId}(id=${detalle.id},pedidoId=${pedido.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas eliminar este detalle?')">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
