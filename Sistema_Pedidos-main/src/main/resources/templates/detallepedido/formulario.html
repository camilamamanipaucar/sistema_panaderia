<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Agregar Producto al Pedido</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <h1>Agregar Producto al Pedido</h1>

    <form th:action="@{/detalle-pedido/guardar}" th:object="${detallePedido}" method="post">
        <input type="hidden" name="pedidoId" th:value="${pedido.id}">

        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select name="productoId" class="form-control" required>
                <option value="">Seleccione un producto</option>
                <option th:each="producto : ${productos}"
                        th:value="${producto.id}"
                        th:text="${producto.nombre}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" th:field="*{cantidad}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/detalle-pedido/{pedidoId}(pedidoId=${pedido.id})}" class="btn btn-secondary">Volver</a>
    </form>
</div>
</body>
</html>
